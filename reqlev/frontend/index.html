<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReqLev – Gerenciamento de Requisitos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <!-- Toast container -->
    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- Global loader -->
    <div id="global-loader" class="loader-overlay hidden">
      <div class="loader-spinner"></div>
    </div>

    <!-- App root -->
    <div id="app">
      <!-- Views are injected here by the router -->
      <div class="init-screen">
        <img src="/assets/Logo.png" alt="ReqLev Logo" class="init-logo-img" />
      </div>
    </div>

    <!-- Modal container -->
    <div
      id="modal-overlay"
      class="modal-overlay hidden"
      role="dialog"
      aria-modal="true"
    >
      <div id="modal-box" class="modal-box"></div>
    </div>

    <!-- Scripts – order matters -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/sse.js"></script>
    <script src="/static/js/views/login.js"></script>
    <script src="/static/js/views/register.js"></script>
    <script src="/static/js/views/dashboard.js"></script>
    <script src="/static/js/views/project.js"></script>
    <script src="/static/js/router.js"></script>
  </body>
</html>
